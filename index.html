<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation de Fluide - Forces de Pression</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #eab308; /* Jaune pour mettre en valeur les forces */
            --btn-hover: #ca8a04;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
        }
        header {
            text-align: center;
            padding: 1rem 0;
            width: 100%;
            background: rgba(0,0,0,0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 1.5rem; font-weight: 400; letter-spacing: 1px;}
        .subtitle { font-size: 0.9rem; color: #94a3b8; margin-top: 5px; }
        
        .main-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            padding-bottom: 40px;
        }

        .view-container {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }
        
        /* Conteneur pour superposer le dessin vectoriel sur l'image pixelisée */
        .canvas-wrapper {
            position: relative;
            width: 800px;
            height: 320px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            background-color: #000;
        }
        
        #pressureCanvas {
            position: absolute;
            top: 0; left: 0;
            image-rendering: pixelated;
        }
        
        #vectorCanvas {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none; /* Laisse passer les clics si besoin */
        }
        
        .legend {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 5px;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .color-box { width: 12px; height: 12px; border-radius: 2px; }

        /* --- Tableau de bord des forces --- */
        .force-dashboard {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.3);
            border: 1px solid #334155;
            padding: 10px 20px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            margin-top: 5px;
        }
        .force-stat {
            text-align: center;
            font-family: monospace;
            font-size: 1.1rem;
        }
        .force-stat span {
            display: block;
            font-size: 0.8rem;
            color: #94a3b8;
            font-family: 'Segoe UI', sans-serif;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .val-drag { color: #f87171; } /* Rouge clair */
        .val-lift { color: #60a5fa; } /* Bleu clair */

        /* --- Contrôles --- */
        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: var(--panel-bg);
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid #334155;
            width: 740px; 
        }
        
        .transport-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #334155;
        }
        
        .params-controls {
            display: flex;
            gap: 30px;
            justify-content: space-between;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            margin-top: 5px;
        }
        
        label { font-size: 0.9rem; color: #94a3b8; }
        .value-display { font-weight: bold; color: var(--accent); }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--accent);
        }
        input[type=checkbox] {
            accent-color: var(--accent);
            width: 16px; height: 16px; cursor: pointer;
        }
        
        button {
            background-color: #334155;
            color: white;
            border: 1px solid #475569;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button:hover { background-color: #475569; }
        button.active { background-color: var(--accent); border-color: var(--accent); color: #000; }
        button.active:hover { background-color: var(--btn-hover); }
        button.danger { background-color: #ef4444; border-color: #ef4444; }
        button.danger:hover { background-color: #dc2626; }
        
        .icon-play { width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid currentColor; }
        .icon-pause { width: 10px; height: 12px; border-left: 3px solid currentColor; border-right: 3px solid currentColor; box-sizing: border-box; }
        .icon-reset { width: 12px; height: 12px; border: 2px solid white; border-radius: 50%; border-right-color: transparent; }

    </style>
</head>
<body>

    <header>
        <h1>Intégration des Forces de Pression</h1>
        <div class="subtitle">Analyse de la Traînée ($\vec{W}_x$) et de la Portance ($\vec{W}_y$) sur l'obstacle.</div>
    </header>

    <div class="main-container">
        
        <div class="controls-panel">
            <div class="transport-controls">
                <button id="playBtn" class="active"><div class="icon-play"></div> Lecture</button>
                <button id="pauseBtn"><div class="icon-pause"></div> Pause</button>
                <button id="resetBtn" class="danger"><div class="icon-reset"></div> Réinitialiser</button>
            </div>
            
            <div class="params-controls">
                <div class="control-group">
                    <label>Vitesse d'entrée ($U_{in}$) : <span id="velVal" class="value-display">1.5</span></label>
                    <input type="range" id="velSlider" min="0.1" max="3.0" step="0.1" value="1.5">
                </div>
                <div class="control-group">
                    <label>Nombre de Reynolds ($Re$) : <span id="reVal" class="value-display">500</span></label>
                    <input type="range" id="reSlider" min="10" max="3000" step="10" value="500">
                    <label class="toggle-group">
                        <input type="checkbox" id="showLocalForces" checked>
                        Afficher les vecteurs locaux $\vec{W}_k$
                    </label>
                </div>
            </div>
        </div>

        <div class="view-container">
            <div class="canvas-wrapper">
                <!-- Canvas pour les pixels de pression -->
                <canvas id="pressureCanvas" width="800" height="320"></canvas>
                <!-- Canvas pour dessiner les vecteurs forces proprement au dessus -->
                <canvas id="vectorCanvas" width="800" height="320"></canvas>
            </div>
            
            <div class="force-dashboard">
                <div class="force-stat">
                    <span>Traînée (Horizontale $\vec{W}_x$)</span>
                    <div id="dragVal" class="val-drag">0.000</div>
                </div>
                <div class="force-stat">
                    <span>Portance (Verticale $\vec{W}_y$)</span>
                    <div id="liftVal" class="val-lift">0.000</div>
                </div>
            </div>

            <div class="legend">
                <div class="legend-item"><div class="color-box" style="background: blue;"></div> Succion (Dépression)</div>
                <div class="legend-item"><div class="color-box" style="background: #10b981;"></div> Pression Ambiante</div>
                <div class="legend-item"><div class="color-box" style="background: red;"></div> Pression d'impact</div>
            </div>
        </div>
    </div>

    <script>
        class Fluid {
            constructor(resX, resY, domainHeight) {
                this.resX = resX;
                this.resY = resY;
                this.numCells = resX * resY;
                this.h = domainHeight / resY;
                this.domainHeight = domainHeight;
                
                this.u = new Float32Array(this.numCells);
                this.v = new Float32Array(this.numCells);
                this.newU = new Float32Array(this.numCells);
                this.newV = new Float32Array(this.numCells);
                this.p = new Float32Array(this.numCells); 
                this.s = new Float32Array(this.numCells);
                
                this.obstacleRadius = 0.1;
                this.obstacleX = 0.25 * (resX * this.h); 
                this.obstacleY = 0.5 * domainHeight;
                
                this.reset();
            }

            reset() {
                this.u.fill(0.0);
                this.v.fill(0.0);
                this.p.fill(0.0);
                this.s.fill(1.0);
                this.setupObstacle();
            }

            setupObstacle() {
                for (let i = 0; i < this.resX; i++) {
                    for (let j = 0; j < this.resY; j++) {
                        let x = (i + 0.5) * this.h;
                        let y = (j + 0.5) * this.h;
                        let dx = x - this.obstacleX;
                        let dy = y - this.obstacleY;
                        
                        if (dx*dx + dy*dy < this.obstacleRadius * this.obstacleRadius) {
                            this.s[i * this.resY + j] = 0.0;
                        }
                    }
                }
            }

            idxY(j) { return (j % this.resY + this.resY) % this.resY; }

            solveViscosity(nu, dt, iters) {
                if (nu === 0) return;
                let alpha = nu * dt / (this.h * this.h);
                let nY = this.resY;
                this.newU.set(this.u); this.newV.set(this.v);

                for (let iter = 0; iter < iters; iter++) {
                    for (let i = 1; i < this.resX - 1; i++) {
                        for (let j = 0; j < this.resY; j++) {
                            if (this.s[i*nY + j] === 0.0) continue;
                            let jTop = this.idxY(j + 1); let jBot = this.idxY(j - 1);
                            this.u[i*nY + j] = (this.newU[i*nY + j] + alpha * (this.u[(i-1)*nY + j] + this.u[(i+1)*nY + j] + this.u[i*nY + jBot] + this.u[i*nY + jTop])) / (1 + 4*alpha);
                            this.v[i*nY + j] = (this.newV[i*nY + j] + alpha * (this.v[(i-1)*nY + j] + this.v[(i+1)*nY + j] + this.v[i*nY + jBot] + this.v[i*nY + jTop])) / (1 + 4*alpha);
                        }
                    }
                }
            }

            solveIncompressibility(iters) {
                let nY = this.resY;
                let cp = 1.9; 
                this.p.fill(0.0);

                for (let iter = 0; iter < iters; iter++) {
                    for (let i = 1; i < this.resX - 1; i++) {
                        for (let j = 0; j < this.resY; j++) {
                            if (this.s[i*nY + j] === 0.0) continue;
                            let jTop = this.idxY(j + 1); let jBot = this.idxY(j - 1);
                            let sLeft = this.s[(i-1)*nY + j], sRight = this.s[(i+1)*nY + j];
                            let sBottom = this.s[i*nY + jBot], sTop = this.s[i*nY + jTop];

                            let sTot = sLeft + sRight + sBottom + sTop;
                            if (sTot === 0.0) continue;

                            let div = this.u[(i+1)*nY + j] - this.u[i*nY + j] + this.v[i*nY + jTop] - this.v[i*nY + j];
                            let p_val = -div / sTot * cp;
                            
                            this.p[i*nY + j] += p_val;

                            this.u[i*nY + j] -= sLeft * p_val;
                            this.u[(i+1)*nY + j] += sRight * p_val;
                            this.v[i*nY + j] -= sBottom * p_val;
                            this.v[i*nY + jTop] += sTop * p_val;
                        }
                    }
                }
            }

            advect(dt) {
                this.newU.set(this.u); this.newV.set(this.v);
                let nY = this.resY, h2 = 0.5 * this.h;

                for (let i = 1; i < this.resX - 1; i++) {
                    for (let j = 0; j < this.resY; j++) {
                        if (this.s[i*nY + j] === 0.0) continue;
                        let jTop = this.idxY(j + 1), jBot = this.idxY(j - 1);

                        if (this.s[(i-1)*nY + j] !== 0.0) {
                            let x = i*this.h, y = j*this.h + h2;
                            let u = this.u[i*nY + j];
                            let v = (this.v[(i-1)*nY + j] + this.v[(i-1)*nY + jTop] + this.v[i*nY + j] + this.v[i*nY + jTop]) * 0.25;
                            x = x - dt*u; y = y - dt*v;
                            this.newU[i*nY + j] = this.sampleField(x, y, 1);
                        }
                        
                        let x = i*this.h + h2, y = j*this.h;
                        let u = (this.u[i*nY + jBot] + this.u[i*nY + j] + this.u[(i+1)*nY + jBot] + this.u[(i+1)*nY + j]) * 0.25;
                        let v = this.v[i*nY + j];
                        x = x - dt*u; y = y - dt*v;
                        this.newV[i*nY + j] = this.sampleField(x, y, 2);
                    }
                }
                this.u.set(this.newU); this.v.set(this.newV);
            }

            sampleField(x, y, fieldType) {
                let nY = this.resY, nX = this.resX, h = this.h, h1 = 1.0 / h, h2 = 0.5 * h;
                x = Math.max(Math.min(x, nX * h), h);
                y = (y % this.domainHeight + this.domainHeight) % this.domainHeight;

                let dx = 0.0, dy = 0.0;
                let f = (fieldType === 1) ? this.u : this.v;
                if (fieldType === 1) dy = h2; else dx = h2; 

                let x0 = Math.min(Math.floor((x - dx) * h1), nX - 1);
                let tx = ((x - dx) - x0 * h) * h1;
                let x1 = Math.min(x0 + 1, nX - 1);

                let yReal = (y - dy) * h1;
                let y0 = Math.floor(yReal);
                let ty = yReal - y0;
                y0 = this.idxY(y0);
                let y1 = this.idxY(y0 + 1);

                let sx = 1.0 - tx, sy = 1.0 - ty;
                return sx * sy * f[x0*nY + y0] + tx * sy * f[x1*nY + y0] + tx * ty * f[x1*nY + y1] + sx * ty * f[x0*nY + y1];
            }

            setBoundaries(inflowVel) {
                let nY = this.resY;
                for (let j = 0; j < this.resY; j++) {
                    this.u[0*nY + j] = inflowVel;
                    this.u[1*nY + j] = inflowVel;
                    let noise = (Math.random() - 0.5) * 0.1 * inflowVel; // Bruit pour créer les vortex
                    this.v[1*nY + j] = noise;
                    this.u[(this.resX-1)*nY + j] = this.u[(this.resX-2)*nY + j];
                    this.v[(this.resX-1)*nY + j] = this.v[(this.resX-2)*nY + j];
                }
            }

            simulateStep(dt, inflowVel, reynoldsNumber, iters) {
                let D = this.obstacleRadius * 2.0;
                let nu = (inflowVel * D) / reynoldsNumber;
                this.setBoundaries(inflowVel);
                this.solveViscosity(nu, dt, 4); 
                this.solveIncompressibility(iters);
                this.advect(dt);
            }
        }

        // === INITIALISATION ===
        const resX = 200, resY = 80;
        const canvasWidth = 800, canvasHeight = 320;
        
        const cvsPressure = document.getElementById('pressureCanvas');
        const ctxPress = cvsPressure.getContext('2d');
        
        const cvsVectors = document.getElementById('vectorCanvas');
        const ctxVect = cvsVectors.getContext('2d');

        let fluid = new Fluid(resX, resY, 1.0);
        let imgDataPress = ctxPress.createImageData(resX, resY);
        let tmpCvsPress = document.createElement('canvas'); tmpCvsPress.width = resX; tmpCvsPress.height = resY;
        let tmpCtxPress = tmpCvsPress.getContext('2d');

        let isRunning = true;

        // UI
        const velSlider = document.getElementById('velSlider'), reSlider = document.getElementById('reSlider');
        const velVal = document.getElementById('velVal'), reVal = document.getElementById('reVal');
        const playBtn = document.getElementById('playBtn'), pauseBtn = document.getElementById('pauseBtn'), resetBtn = document.getElementById('resetBtn');
        const showLocalForcesCheckbox = document.getElementById('showLocalForces');
        const dragValDisplay = document.getElementById('dragVal'), liftValDisplay = document.getElementById('liftVal');

        velSlider.addEventListener('input', (e) => velVal.innerText = e.target.value);
        reSlider.addEventListener('input', (e) => reVal.innerText = e.target.value);
        playBtn.addEventListener('click', () => { isRunning = true; playBtn.classList.add('active'); pauseBtn.classList.remove('active'); });
        pauseBtn.addEventListener('click', () => { isRunning = false; pauseBtn.classList.add('active'); playBtn.classList.remove('active'); });
        resetBtn.addEventListener('click', () => { fluid.reset(); updateVisualization(); });
        showLocalForcesCheckbox.addEventListener('change', () => { if(!isRunning) updateVisualization(); });

        // --- FONCTION DE DESSIN D'UNE FLÈCHE ---
        function drawArrow(ctx, fromx, fromy, tox, toy, color, width) {
            let headlen = 8; // longueur de la tête
            let dx = tox - fromx;
            let dy = toy - fromy;
            let angle = Math.atan2(dy, dx);
            
            // Éviter de dessiner de minuscules flèches invisibles
            if(Math.sqrt(dx*dx + dy*dy) < 2) return; 

            ctx.beginPath();
            ctx.moveTo(fromx, fromy);
            ctx.lineTo(tox, toy);
            ctx.lineTo(tox - headlen * Math.cos(angle - Math.PI / 6), toy - headlen * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(tox, toy);
            ctx.lineTo(tox - headlen * Math.cos(angle + Math.PI / 6), toy - headlen * Math.sin(angle + Math.PI / 6));
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.stroke();
        }

        // --- FONCTION PRINCIPALE DE RENDU ---
        function updateVisualization() {
            let nY = fluid.resY, nX = fluid.resX;
            let forceX = 0, forceY = 0;
            let localArrows = []; // Stockage des vecteurs W_k

            // 1. DESSINER LE FOND DE PRESSION ET CALCULER LES FORCES
            for (let i = 0; i < nX; i++) {
                for (let j = 0; j < nY; j++) {
                    let idx = i * nY + j;
                    let pxlIdx = ((nY - 1 - j) * nX + i) * 4; 

                    if (fluid.s[idx] === 0.0) {
                        // Cellule solide (cylindre) : Gris très foncé
                        imgDataPress.data[pxlIdx] = 30; imgDataPress.data[pxlIdx+1] = 30; imgDataPress.data[pxlIdx+2] = 30; imgDataPress.data[pxlIdx+3] = 255;
                        
                        // --- CALCUL DES FORCES (Recherche des bords) ---
                        let jTop = fluid.idxY(j + 1), jBot = fluid.idxY(j - 1);
                        let isBoundary = false;
                        
                        // Si une cellule voisine est fluide, on est sur la frontière
                        if (i>0 && fluid.s[(i-1)*nY + j] === 1.0) isBoundary = true;
                        if (i<nX-1 && fluid.s[(i+1)*nY + j] === 1.0) isBoundary = true;
                        if (fluid.s[i*nY + jBot] === 1.0) isBoundary = true;
                        if (fluid.s[i*nY + jTop] === 1.0) isBoundary = true;

                        if (isBoundary) {
                            let x_m = (i + 0.5) * fluid.h;
                            let y_m = (j + 0.5) * fluid.h;
                            
                            // Moyenne de la pression des voisins fluides
                            let pAvg = 0, count = 0;
                            if (i>0 && fluid.s[(i-1)*nY + j] === 1.0) { pAvg += fluid.p[(i-1)*nY + j]; count++; }
                            if (i<nX-1 && fluid.s[(i+1)*nY + j] === 1.0) { pAvg += fluid.p[(i+1)*nY + j]; count++; }
                            if (fluid.s[i*nY + jBot] === 1.0) { pAvg += fluid.p[i*nY + jBot]; count++; }
                            if (fluid.s[i*nY + jTop] === 1.0) { pAvg += fluid.p[i*nY + jTop]; count++; }
                            let p = pAvg / count;

                            // Vecteur radial allant de la frontière vers le centre de l'obstacle
                            let dx = fluid.obstacleX - x_m;
                            let dy = fluid.obstacleY - y_m;
                            let dist = Math.sqrt(dx*dx + dy*dy);
                            
                            let nx = dx / dist; // Normale pointant vers l'intérieur
                            let ny = dy / dist;

                            // Contribution locale à la force
                            let dFx = p * nx;
                            let dFy = p * ny;
                            forceX += dFx;
                            forceY += dFy;

                            localArrows.push({x: x_m, y: y_m, fx: dFx, fy: dFy, p: p});
                        }
                        continue;
                    }

                    // --- COLORISATION DE LA PRESSION ---
                    let p = fluid.p[idx];
                    let scaleColor = 1.5; 
                    let v = Math.max(-1.0, Math.min(1.0, p * scaleColor)); 
                    let r = 0, g = 0, b = 0;

                    if (v > 0) {
                        r = Math.floor(16 + 239 * v); g = Math.floor(185 * (1 - v)); b = Math.floor(129 * (1 - v));
                    } else {
                        v = -v; r = Math.floor(16 * (1 - v)); g = Math.floor(185 * (1 - v)); b = Math.floor(129 + 126 * v);
                    }
                    imgDataPress.data[pxlIdx] = r; imgDataPress.data[pxlIdx+1] = g; imgDataPress.data[pxlIdx+2] = b; imgDataPress.data[pxlIdx+3] = 255;
                }
            }
            
            // Afficher les pixels sur le canvas de fond
            tmpCtxPress.putImageData(imgDataPress, 0, 0);
            ctxPress.clearRect(0, 0, canvasWidth, canvasHeight);
            ctxPress.drawImage(tmpCvsPress, 0, 0, canvasWidth, canvasHeight);

            // 2. DESSINER LES VECTEURS FORCES PAR-DESSUS
            ctxVect.clearRect(0, 0, canvasWidth, canvasHeight);
            
            // Facteurs d'échelle pour transformer coordonnées physiques -> pixels
            let scaleX = canvasWidth / (fluid.resX * fluid.h);
            let scaleY = canvasHeight / fluid.domainHeight;
            let centerCvsX = fluid.obstacleX * scaleX;
            let centerCvsY = canvasHeight - (fluid.obstacleY * scaleY); // Y inversé en canvas

            let forceVisualScale = 3000.0; // Multiplicateur pour rendre les flèches visibles à l'écran

            // Dessiner W_k (forces locales)
            if (showLocalForcesCheckbox.checked) {
                localArrows.forEach(arr => {
                    let startX = arr.x * scaleX;
                    let startY = canvasHeight - (arr.y * scaleY);
                    
                    // La force fx/fy s'applique dans le monde physique. On la met à l'échelle pour l'écran
                    let endX = startX + arr.fx * forceVisualScale;
                    let endY = startY - arr.fy * forceVisualScale; // -fy car axe Y inversé
                    
                    // Si p est positif (pousse vers le centre), jaune pastel. Si négatif (succion, tire vers l'extérieur), magenta.
                    let color = arr.p > 0 ? 'rgba(253, 224, 71, 0.7)' : 'rgba(217, 70, 239, 0.7)';
                    drawArrow(ctxVect, startX, startY, endX, endY, color, 1.5);
                });
            }

            // Dessiner W_* (résultante)
            let resScale = forceVisualScale * 0.1; // Ajustement d'échelle pour la résultante globale
            let resEndX = centerCvsX + forceX * resScale;
            let resEndY = centerCvsY - forceY * resScale;
            
            // Cercle central d'origine
            ctxVect.beginPath(); ctxVect.arc(centerCvsX, centerCvsY, 4, 0, 2*Math.PI); ctxVect.fillStyle = '#ef4444'; ctxVect.fill();
            
            // Flèche résultante (en rouge pétant)
            drawArrow(ctxVect, centerCvsX, centerCvsY, resEndX, resEndY, '#ef4444', 3.5);

            // 3. METTRE À JOUR LE TEXTE
            dragValDisplay.innerText = forceX.toFixed(3);
            liftValDisplay.innerText = forceY.toFixed(3);
            
            // Coloration dynamique du texte de portance pour voir l'oscillation
            liftValDisplay.style.color = forceY > 0 ? '#fca5a5' : '#93c5fd';
        }

        function loop() {
            if (isRunning) {
                let inflowVel = parseFloat(velSlider.value);
                let reynolds = parseFloat(reSlider.value);
                let dt = 1.0 / 60.0;
                let numIters = 40; 
                let subSteps = 2; 
                let simDt = dt / subSteps;

                for (let step = 0; step < subSteps; step++) {
                    fluid.simulateStep(simDt, inflowVel, reynolds, numIters);
                }
                updateVisualization();
            }
            requestAnimationFrame(loop);
        }

        updateVisualization();
        loop();

    </script>
</body>
</html>
